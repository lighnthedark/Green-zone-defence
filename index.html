<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="author" content="Spencer Green">
    <meta name="copyright" content="© 2026 Spencer Green. All Rights Reserved.">
    <title>Green Zone Defence</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
            position: relative;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(1px 1px at 20px 30px, #fff, transparent),
                radial-gradient(1px 1px at 40px 70px, rgba(255, 255, 255, 0.8), transparent),
                radial-gradient(1px 1px at 50px 160px, rgba(255, 255, 255, 0.6), transparent),
                radial-gradient(1px 1px at 90px 40px, #fff, transparent),
                radial-gradient(1px 1px at 130px 80px, rgba(255, 255, 255, 0.7), transparent),
                radial-gradient(1px 1px at 160px 120px, #fff, transparent);
            background-size: 550px 250px;
            animation: twinkle 4s ease-in-out infinite alternate;
            z-index: -1;
        }

        @keyframes twinkle {
            0% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }

        .game-cabinet {
            background: linear-gradient(145deg, #1a1a2e, #0f0f1a);
            border: 4px solid #2d2d4a;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 0 60px rgba(0, 255, 136, 0.15), inset 0 0 30px rgba(0, 0, 0, 0.5);
            max-width: 95vw;
        }

        @media (max-width: 600px) {
            .game-cabinet {
                padding: 10px;
                border-radius: 8px;
            }

            .game-screen {
                width: 100%;
            }

            canvas {
                width: 100%;
                height: auto;
            }

            .header {
                flex-wrap: wrap;
                gap: 5px;
                justify-content: flex-start;
                padding: 20px;
                box-sizing: border-box;
            }

            .score-display,
            .high-score-display,
            .lives-display {
                font-size: 9px;
            }

            .title {
                font-size: 18px;
            }

            .subtitle {
                font-size: 8px;
                margin-bottom: 25px;
            }

            .diff-btn {
                font-size: 10px;
                padding: 12px 20px;
            }

            .credit {
                font-size: 5px;
            }

            #eyesCanvasGO {
                width: 120px;
                height: 48px;
                margin-bottom: 5px;
            }

            .game-over-text {
                font-size: 14px;
                margin-bottom: 10px;
            }

            .final-score {
                font-size: 10px;
                margin-bottom: 10px;
            }

            .initials-entry {
                margin: 8px 0;
            }

            .initials-label {
                font-size: 8px;
                margin-bottom: 8px;
            }

            .initials-slots {
                margin-bottom: 10px;
            }

            .letter-picker {
                max-width: 260px;
                gap: 3px;
                margin-bottom: 8px;
            }

            .letter-btn {
                width: 24px;
                height: 24px;
                font-size: 7px;
            }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 10px;
        }

        .score-display,
        .high-score-display,
        .lives-display {
            color: #00ff88;
            font-size: 12px;
            text-shadow: 0 0 10px #00ff88;
        }

        .high-score-display {
            color: #ff6b6b;
            text-shadow: 0 0 10px #ff6b6b;
        }

        .lives-display {
            color: #4ecdc4;
            text-shadow: 0 0 10px #4ecdc4;
        }

        .game-screen {
            position: relative;
            background: #000;
            border: 3px solid #333;
            border-radius: 4px;
            overflow: auto;
        }

        .game-screen::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.1) 2px, rgba(0, 0, 0, 0.1) 4px);
            pointer-events: none;
        }

        canvas {
            display: block;
            touch-action: none;
        }

        .controls-info {
            margin-top: 15px;
            text-align: center;
            color: #666;
            font-size: 8px;
        }

        .controls-info span {
            color: #00ff88;
        }

        .credit {
            margin-top: 10px;
            text-align: center;
            color: #444;
            font-size: 6px;
            letter-spacing: 1px;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 20px;
            z-index: 20;
            touch-action: auto;
        }

        .overlay.hidden {
            display: none;
        }

        .title {
            color: #00ff88;
            font-size: 24px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88, 0 0 60px #00ff88;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .subtitle {
            color: #4ecdc4;
            font-size: 10px;
            margin-bottom: 40px;
            text-shadow: 0 0 10px #4ecdc4;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }

        .difficulty-select {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .diff-label {
            color: #ffd93d;
            font-size: 10px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #ffd93d;
        }

        .diff-btn {
            background: transparent;
            border: 2px solid #00ff88;
            color: #00ff88;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            padding: 12px 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 0 10px #00ff88;
            min-width: 150px;
        }

        .diff-btn:hover {
            background: #00ff88;
            color: #0a0a0f;
            box-shadow: 0 0 30px #00ff88;
        }

        #normalBtn {
            border-color: #ffd93d;
            color: #ffd93d;
            text-shadow: 0 0 10px #ffd93d;
        }

        #normalBtn:hover {
            background: #ffd93d;
            color: #0a0a0f;
            box-shadow: 0 0 30px #ffd93d;
        }

        #hardBtn {
            border-color: #ff6b6b;
            color: #ff6b6b;
            text-shadow: 0 0 10px #ff6b6b;
        }

        #hardBtn:hover {
            background: #ff6b6b;
            color: #0a0a0f;
            box-shadow: 0 0 30px #ff6b6b;
        }

        #demoBtn {
            border-color: #ff00ff;
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
            margin-top: 20px;
        }

        #demoBtn:hover {
            background: #ff00ff;
            color: #0a0a0f;
            box-shadow: 0 0 30px #ff00ff;
        }

        #leaderboardBtn {
            border-color: #4ecdc4;
            color: #4ecdc4;
            text-shadow: 0 0 10px #4ecdc4;
            margin-top: 10px;
        }

        #leaderboardBtn:hover {
            background: #4ecdc4;
            color: #0a0a0f;
            box-shadow: 0 0 30px #4ecdc4;
        }

        .start-btn {
            background: transparent;
            border: 2px solid #00ff88;
            color: #00ff88;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            padding: 15px 30px;
            cursor: pointer;
            text-shadow: 0 0 10px #00ff88;
            margin-top: 10px;
            touch-action: manipulation;
        }

        .start-btn:hover {
            background: #00ff88;
            color: #0a0a0f;
            box-shadow: 0 0 30px #00ff88;
        }

        .game-over-text {
            color: #ff6b6b;
            font-size: 20px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #ff6b6b;
        }

        .final-score {
            color: #fff;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .wave-announce {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffd93d;
            font-size: 16px;
            text-shadow: 0 0 20px #ffd93d;
            z-index: 15;
            animation: waveIn 2s ease-out forwards;
            pointer-events: none;
        }

        @keyframes waveIn {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }

            20% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2);
            }

            40% {
                transform: translate(-50%, -50%) scale(1);
            }

            80% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }

        .mobile-controls {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-top: 15px;
            gap: 10px;
        }

        .control-hint {
            color: #4ecdc4;
            font-size: 8px;
            text-align: center;
            text-shadow: 0 0 10px #4ecdc4;
        }

        .mode-toggle {
            display: flex;
            gap: 10px;
        }

        .mode-btn {
            background: rgba(0, 255, 136, 0.2);
            border: 2px solid #00ff88;
            color: #00ff88;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
        }

        .mode-btn.active {
            background: #00ff88;
            color: #0a0a0f;
        }

        .mode-btn.gyro {
            border-color: #ffd93d;
            color: #ffd93d;
        }

        .mode-btn.gyro.active {
            background: #ffd93d;
            color: #0a0a0f;
        }

        .powerup-indicator {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd93d;
            font-size: 8px;
            text-shadow: 0 0 10px #ffd93d;
            z-index: 15;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .powerup-indicator.show {
            opacity: 1;
        }

        @media (max-width: 900px) {
            .mobile-controls {
                display: flex;
            }

            .controls-info {
                display: none;
            }
        }

        .initials-entry {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px 0;
        }

        .initials-label {
            color: #ffd93d;
            font-size: 10px;
            margin-bottom: 15px;
            text-shadow: 0 0 10px #ffd93d;
        }

        .initials-slots {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .initial-slot {
            width: 40px;
            height: 50px;
            background: rgba(0, 255, 136, 0.1);
            border: 2px solid #00ff88;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        .initial-slot.active {
            background: rgba(0, 255, 136, 0.3);
            box-shadow: 0 0 20px #00ff88;
        }

        .initial-slot:hover {
            background: rgba(0, 255, 136, 0.2);
        }

        .letter-picker {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
            max-width: 300px;
            margin-bottom: 15px;
        }

        .letter-btn {
            width: 30px;
            height: 30px;
            background: transparent;
            border: 1px solid #4ecdc4;
            color: #4ecdc4;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        .letter-btn:hover {
            background: #4ecdc4;
            color: #0a0a0f;
        }

        .leaderboard-title {
            color: #ffd93d;
            font-size: 14px;
            margin-bottom: 20px;
            text-shadow: 0 0 15px #ffd93d;
        }

        .leaderboard-list {
            width: 100%;
            max-width: 350px;
            margin-bottom: 20px;
        }

        .leaderboard-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 15px;
            border-bottom: 1px solid #333;
            font-size: 10px;
        }

        .leaderboard-row.header {
            color: #4ecdc4;
            border-bottom: 2px solid #4ecdc4;
        }

        .leaderboard-row .rank {
            color: #ffd93d;
            width: 30px;
        }

        .leaderboard-row .initials {
            color: #00ff88;
            width: 60px;
            text-align: center;
        }

        .leaderboard-row .lb-score {
            color: #fff;
            width: 80px;
            text-align: right;
        }

        .leaderboard-row .lb-diff {
            color: #ff6b6b;
            width: 80px;
            text-align: right;
        }

        .leaderboard-loading {
            color: #4ecdc4;
            font-size: 10px;
            animation: pulse 1s infinite;
        }

        .back-btn {
            background: transparent;
            border: 2px solid #666;
            color: #666;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            padding: 10px 20px;
            cursor: pointer;
            margin-top: 10px;
            touch-action: manipulation;
        }

        .back-btn:hover {
            border-color: #fff;
            color: #fff;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
            max-width: 280px;
        }

        .auth-form.hidden {
            display: none;
        }

        .auth-title {
            color: #ffd93d;
            font-size: 14px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #ffd93d;
        }

        .auth-input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 255, 136, 0.1);
            border: 2px solid #00ff88;
            color: #00ff88;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            outline: none;
            text-transform: uppercase;
        }

        .auth-input::placeholder {
            color: rgba(0, 255, 136, 0.5);
        }

        .auth-input:focus {
            background: rgba(0, 255, 136, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }

        .auth-btn {
            background: transparent;
            border: 2px solid #00ff88;
            color: #00ff88;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            padding: 12px 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 0 10px #00ff88;
            margin: 5px;
            touch-action: manipulation;
        }

        .auth-btn:hover {
            background: #00ff88;
            color: #0a0a0f;
            box-shadow: 0 0 20px #00ff88;
        }

        .auth-btn.signup {
            border-color: #ffd93d;
            color: #ffd93d;
            text-shadow: 0 0 10px #ffd93d;
        }

        .auth-btn.signup:hover {
            background: #ffd93d;
            color: #0a0a0f;
            box-shadow: 0 0 20px #ffd93d;
        }

        .auth-btn.guest {
            border-color: #666;
            color: #666;
            text-shadow: none;
            margin-top: 15px;
        }

        .auth-btn.guest:hover {
            border-color: #999;
            color: #999;
        }

        .auth-btn.back {
            border-color: #666;
            color: #666;
            text-shadow: none;
        }

        .auth-btn.logout {
            border-color: #ff6b6b;
            color: #ff6b6b;
            text-shadow: 0 0 10px #ff6b6b;
            margin-top: 20px;
        }

        .auth-btn.logout:hover {
            background: #ff6b6b;
            color: #0a0a0f;
        }

        .auth-error {
            color: #ff6b6b;
            font-size: 8px;
            text-align: center;
            min-height: 20px;
        }

        .welcome-msg {
            color: #4ecdc4;
            font-size: 10px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #4ecdc4;
        }

        .welcome-msg.hidden {
            display: none;
        }

        #authSection {
            text-align: center;
        }

        #authButtons {
            margin-bottom: 10px;
        }

        #gameMenu.hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div class="game-cabinet">
        <div class="header">
            <div class="score-display">SCORE: <span id="score">0</span></div>
            <div class="high-score-display">HI: <span id="high-score">0</span></div>
            <div class="lives-display">LIVES: <span id="lives">3</span></div>
        </div>
        <div class="game-screen">
            <canvas id="gameCanvas" width="560" height="600"></canvas>
            <div id="powerupIndicator" class="powerup-indicator"></div>

            <div id="startOverlay" class="overlay">
                <canvas id="eyesCanvas" width="200" height="80" style="margin-bottom: 10px;"></canvas>
                <div class="title">GREEN ZONE</div>
                <div class="title" style="color: #ff6b6b; text-shadow: 0 0 20px #ff6b6b, 0 0 40px #ff6b6b;">DEFENCE
                </div>
                <div class="subtitle">HOLD THE LINE</div>

                <div id="authSection">
                    <div id="welcomeUser" class="welcome-msg hidden"></div>
                    <div id="authButtons">
                        <button class="auth-btn" id="showLoginBtn">LOG IN</button>
                        <button class="auth-btn signup" id="showSignupBtn">SIGN UP</button>
                    </div>
                    <button class="auth-btn guest" id="guestBtn">PLAY AS GUEST</button>
                </div>

                <div id="loginForm" class="auth-form hidden">
                    <div class="auth-title">LOG IN</div>
                    <input type="email" id="loginEmail" class="auth-input" placeholder="EMAIL">
                    <input type="password" id="loginPassword" class="auth-input" placeholder="PASSWORD">
                    <div id="loginError" class="auth-error"></div>
                    <button class="auth-btn" id="loginBtn">LOG IN</button>
                    <button class="auth-btn back" id="backFromLogin">BACK</button>
                </div>

                <div id="signupForm" class="auth-form hidden">
                    <div class="auth-title">SIGN UP</div>
                    <input type="text" id="signupName" class="auth-input" placeholder="DISPLAY NAME">
                    <input type="email" id="signupEmail" class="auth-input" placeholder="EMAIL">
                    <input type="password" id="signupPassword" class="auth-input" placeholder="PASSWORD (6+ CHARS)">
                    <div id="signupError" class="auth-error"></div>
                    <button class="auth-btn signup" id="signupBtn">CREATE ACCOUNT</button>
                    <button class="auth-btn back" id="backFromSignup">BACK</button>
                </div>

                <div id="gameMenu" class="hidden">
                    <div class="difficulty-select">
                        <div class="diff-label">SELECT DIFFICULTY</div>
                        <button class="diff-btn" id="easyBtn">EASY</button>
                        <button class="diff-btn" id="normalBtn">NORMAL</button>
                        <button class="diff-btn" id="hardBtn">HARD</button>
                        <button class="diff-btn" id="demoBtn">DEMO MODE</button>
                        <button class="diff-btn" id="leaderboardBtn">LEADERBOARD</button>
                    </div>
                    <button class="auth-btn logout" id="logoutBtn">LOG OUT</button>
                </div>
            </div>

            <div id="gameOverOverlay" class="overlay hidden">
                <canvas id="eyesCanvasGO" width="200" height="80" style="margin-bottom: 10px;"></canvas>
                <div class="game-over-text">GAME OVER</div>
                <div class="final-score">SCORE: <span id="finalScore">0</span></div>

                <div class="initials-entry" id="initialsEntry">
                    <div class="initials-label">ENTER YOUR INITIALS</div>
                    <div class="initials-slots">
                        <div class="initial-slot active" data-index="0">A</div>
                        <div class="initial-slot" data-index="1">A</div>
                        <div class="initial-slot" data-index="2">A</div>
                    </div>
                    <div class="letter-picker" id="letterPicker"></div>
                    <button class="start-btn" id="submitScoreBtn">SUBMIT SCORE</button>
                </div>

                <button class="start-btn hidden" id="restartBtn">PLAY AGAIN</button>
            </div>

            <div id="leaderboardOverlay" class="overlay hidden">
                <div class="leaderboard-title">TOP SCORES</div>
                <div class="leaderboard-list" id="leaderboardList">
                    <div class="leaderboard-loading">LOADING...</div>
                </div>
                <button class="back-btn" id="backBtn">BACK</button>
            </div>
        </div>
        <div class="controls-info">
            <span>←</span> <span>→</span> MOVE &nbsp;&nbsp; <span>SPACE</span> FIRE &nbsp;&nbsp; <span>P</span> PAUSE
        </div>
        <div class="credit">© 2026 SPENCER GREEN</div>
        <div class="mobile-controls">
            <div class="control-hint" id="controlHint">TOUCH & DRAG TO MOVE • AUTO-FIRE</div>
            <div class="mode-toggle">
                <button class="mode-btn active" id="touchModeBtn">TOUCH</button>
                <button class="mode-btn gyro" id="gyroModeBtn">GYRO</button>
            </div>
        </div>
    </div>

    <script>
        /*
         * GREEN ZONE DEFENCE
         * Copyright © 2026 Spencer Green. All Rights Reserved.

            const animChance = 0.05 + (1 - alive.length / totalAliens) * 0.15;
            if (Math.random() < animChance) aliens.forEach(a => a.frame = a.frame === 0 ? 1 : 0);
            AudioEngine.updateMusicTempo(alive.length, totalAliens);
        }

        function updateMysteryShip() {
            if (mysteryShip) { mysteryShip.x += mysteryShip.speed; if (mysteryShip.x > 610 || mysteryShip.x < -60) mysteryShip = null; }
            else { mysteryShipTimer++; if (mysteryShipTimer > 800 && Math.random() < 0.005) { const fromLeft = Math.random() > 0.5; mysteryShip = { x: fromLeft ? -50 : 610, y: 30, width: 50, height: 20, speed: fromLeft ? 2 : -2 }; mysteryShipTimer = 0; AudioEngine.mysteryAppear(); } }
        }

        function updatePowerUps() {
            powerUps = powerUps.filter(p => { p.y += 1.5; return p.y < 620; });
            powerUps.forEach((p, i) => {
                if (p.x > player.x - 12 && p.x < player.x + 62 && p.y > player.y - 12 && p.y < player.y + 42) {
                    AudioEngine.powerUp();
                    const indicator = document.getElementById('powerupIndicator');
                    if (p.type === 'health') { lives = Math.min(lives + 1, 9); document.getElementById('lives').textContent = lives; indicator.textContent = POWERUP_TYPES.health.label; }
                    else if (p.type === 'shield') { playerShield = true; playerShieldTimer = 480; indicator.textContent = POWERUP_TYPES.shield.label; }
                    else if (p.type === 'spread') { playerSpreadShot = true; playerSpreadTimer = 600; indicator.textContent = POWERUP_TYPES.spread.label; }
                    indicator.style.color = POWERUP_TYPES[p.type].color; indicator.classList.add('show');
                    setTimeout(() => indicator.classList.remove('show'), 1500);
                    explosions.push({ x: p.x, y: p.y, frame: 0, maxFrames: 10, radius: 20, color: POWERUP_TYPES[p.type].color });
                    powerUps.splice(i, 1);
                }
            });
            if (playerShield) { playerShieldTimer--; if (playerShieldTimer <= 0) playerShield = false; }
            if (playerSpreadShot) { playerSpreadTimer--; if (playerSpreadTimer <= 0) playerSpreadShot = false; }
        }

        function spawnPowerUp(x, y) {
            if (Math.random() > 0.15) return;
            const types = ['health', 'shield', 'spread'];
            powerUps.push({ x, y, type: types[Math.floor(Math.random() * types.length)] });
        }

        function updateExplosions() { explosions = explosions.filter(e => { e.frame++; return e.frame < e.maxFrames; }); }

        function checkCollisions() {
            playerBullets.forEach((b, bi) => {
                aliens.forEach(a => {
                    if (!a.alive) return;
                    if (b.x > a.x && b.x < a.x + 35 && b.y > a.y && b.y < a.y + 25) {
                        a.alive = false; playerBullets.splice(bi, 1);
                        score += (5 - a.row) * 10; document.getElementById('score').textContent = score;
                        explosions.push({ x: a.x + 17, y: a.y + 12, frame: 0, maxFrames: 15, radius: 25, color: alienColors[a.row] });
                        AudioEngine.alienHit(); spawnPowerUp(a.x + 17, a.y + 12);
                    }
                });
                if (mysteryShip && b.x > mysteryShip.x && b.x < mysteryShip.x + 50 && b.y > mysteryShip.y && b.y < mysteryShip.y + 20) {
                    score += [50, 100, 150, 300][Math.floor(Math.random() * 4)]; document.getElementById('score').textContent = score;
                    explosions.push({ x: mysteryShip.x + 25, y: mysteryShip.y + 10, frame: 0, maxFrames: 20, radius: 35, color: '#ff00ff' });
                    AudioEngine.mysteryHit();
                    const types = ['health', 'shield', 'spread'];
                    powerUps.push({ x: mysteryShip.x + 25, y: mysteryShip.y + 10, type: types[Math.floor(Math.random() * types.length)] });
                    mysteryShip = null; playerBullets.splice(bi, 1);
                }
            });
            alienBullets.forEach((b, bi) => {
                if (b.x > player.x && b.x < player.x + 50 && b.y > player.y && b.y < player.y + 30) {
                    alienBullets.splice(bi, 1);
                    if (playerShield) { playerShieldTimer = Math.max(0, playerShieldTimer - 120); explosions.push({ x: b.x, y: b.y, frame: 0, maxFrames: 10, radius: 15, color: '#4ecdc4' }); }
                    else { loseLife(); }
                }
            });
            shields.forEach(s => {
                const pw = s.width / 12, ph = s.height / 8;
                playerBullets.forEach((b, bi) => { for (let r = 0; r < 8; r++) for (let c = 0; c < 12; c++) { if (!s.pixels[r][c]) continue; if (b.x > s.x + c * pw && b.x < s.x + (c + 1) * pw && b.y > s.y + r * ph && b.y < s.y + (r + 1) * ph) { s.pixels[r][c] = false; playerBullets.splice(bi, 1); return; } } });
                alienBullets.forEach((b, bi) => { for (let r = 0; r < 8; r++) for (let c = 0; c < 12; c++) { if (!s.pixels[r][c]) continue; if (b.x > s.x + c * pw && b.x < s.x + (c + 1) * pw && b.y > s.y + r * ph && b.y < s.y + (r + 1) * ph) { s.pixels[r][c] = false; alienBullets.splice(bi, 1); return; } } });
            });
            if (aliens.every(a => !a.alive)) nextWave();
        }

        function loseLife() {
            lives--; document.getElementById('lives').textContent = lives;
            explosions.push({ x: player.x + 25, y: player.y + 15, frame: 0, maxFrames: 30, radius: 40, color: '#00ff88' });
            AudioEngine.playerHit();
            if (lives <= 0) gameOver(); else { player.x = 255; alienBullets = []; }
        }

        function nextWave() {
            wave++; const base = difficultySettings[difficulty];
            const scaleRate = difficulty === 'easy' ? 0.1 : difficulty === 'normal' ? 0.2 : 0.3;
            const shootScale = difficulty === 'easy' ? 0.0004 : difficulty === 'normal' ? 0.001 : 0.002;
            alienSpeed = Math.min(3, base.alienSpeed + wave * scaleRate);
            alienShootChance = Math.min(0.01, base.alienShootChance + wave * shootScale);
            alienCrabSpeed = Math.min(0.8, 0.3 + wave * 0.05);
            initAliens(); alienDirection = 1; playerBullets = []; alienBullets = []; powerUps = []; player.x = 255;
            showWaveAnnouncement();
        }

        function showWaveAnnouncement() {
            const existing = document.querySelector('.wave-announce'); if (existing) existing.remove();
            const announce = document.createElement('div'); announce.className = 'wave-announce';
            announce.textContent = `WAVE ${wave}`;
            document.querySelector('.game-screen').appendChild(announce);
            setTimeout(() => announce.remove(), 2000);
        }

        function gameOver() {
            gameRunning = false; stopAutoFire(); AudioEngine.stopMusic(); AudioEngine.gameOverSound();
            if (demoMode) {
                setTimeout(() => { document.getElementById('gameOverOverlay').classList.add('hidden'); startGame('easy', true); }, 3000);
                document.getElementById('initialsEntry').classList.add('hidden');
                document.getElementById('restartBtn').classList.remove('hidden');
            } else {
                currentSlot = 0;
                initials[0] = 'A'; initials[1] = 'A'; initials[2] = 'A';
                updateSlotDisplay(); updateActiveSlot();
                document.getElementById('initialsEntry').classList.remove('hidden');
                document.getElementById('restartBtn').classList.add('hidden');
                const submitBtn = document.getElementById('submitScoreBtn');
                submitBtn.textContent = 'SUBMIT SCORE'; submitBtn.disabled = false;
            }
            if (!demoMode && score > highScore) {
                highScore = score;
                localStorage.setItem('greenZoneDefenceHighScore', highScore);
                document.getElementById('high-score').textContent = highScore;
            }
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverOverlay').classList.remove('hidden');
            drawGlowingEyes('eyesCanvasGO');
        }

        function shoot() {
            if (!canShoot || !gameRunning || gamePaused) return;
            AudioEngine.shoot();
            if (playerSpreadShot) {
                playerBullets.push({ x: player.x + 25, y: player.y, dx: 0 });
                playerBullets.push({ x: player.x + 15, y: player.y, dx: -1.5, spread: true });
                playerBullets.push({ x: player.x + 35, y: player.y, dx: 1.5, spread: true });
            } else { playerBullets.push({ x: player.x + 25, y: player.y }); }
            canShoot = false; setTimeout(() => canShoot = true, shootCooldown);
        }

        function startAutoFire() { if (autoFireInterval) return; shoot(); autoFireInterval = setInterval(shoot, shootCooldown + 50); }
        function stopAutoFire() { if (autoFireInterval) { clearInterval(autoFireInterval); autoFireInterval = null; } }

        function gameLoop() {
            if (!gameRunning) return;
            if (!gamePaused) {
                ctx.clearRect(0, 0, 560, 600); drawBackground();
                updatePlayer(); updateBullets(); updateAliens(); updateMysteryShip(); updatePowerUps(); updateExplosions(); checkCollisions();
                drawShields(); drawAliens(); drawMysteryShip(); drawPlayer(); drawBullets(); drawPowerUps(); drawExplosions();
                drawWatermark();
                if (demoMode) {
                    ctx.fillStyle = '#ff00ff'; ctx.shadowColor = '#ff00ff'; ctx.shadowBlur = 10;
                    ctx.font = '10px "Press Start 2P", monospace'; ctx.textAlign = 'center';
                    ctx.fillText('DEMO MODE - PRESS ANY KEY TO PLAY', 280, 580); ctx.shadowBlur = 0;
                }
            }
            requestAnimationFrame(gameLoop);
        }

        function startGame(diff, isDemo = false) {
            demoMode = isDemo; demoTimer = 0; difficulty = diff;
            const s = difficultySettings[diff];
            score = 0; lives = s.lives; wave = 1;
            alienSpeed = s.alienSpeed; alienShootChance = s.alienShootChance;
            bulletSpeed = s.bulletSpeed; shootCooldown = s.shootCooldown;
            alienDirection = 1; alienCrabOffset = 0; alienCrabDirection = 1; alienCrabSpeed = 0.3;
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            player.x = 255; player.targetX = null;
            playerBullets = []; alienBullets = []; explosions = []; powerUps = [];
            playerShield = false; playerShieldTimer = 0; playerSpreadShot = false; playerSpreadTimer = 0;
            mysteryShip = null; mysteryShipTimer = 0;
            initAliens(); initShields();
            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');
            document.getElementById('leaderboardOverlay').classList.add('hidden');
            gameRunning = true; gamePaused = false;
            AudioEngine.init(); AudioEngine.startMusic(80);
            showWaveAnnouncement(); gameLoop();
        }

        document.addEventListener('keydown', e => {
            if (demoMode && gameRunning) { gameRunning = false; AudioEngine.stopMusic(); demoMode = false; document.getElementById('startOverlay').classList.remove('hidden'); return; }
            if (e.key === 'ArrowLeft' || e.key === 'a') { player.dx = -player.speed; player.targetX = null; }
            else if (e.key === 'ArrowRight' || e.key === 'd') { player.dx = player.speed; player.targetX = null; }
            else if (e.key === ' ') { e.preventDefault(); shoot(); }
            else if (e.key === 'p' || e.key === 'P') gamePaused = !gamePaused;
        });

        document.addEventListener('keyup', e => {
            if ((e.key === 'ArrowLeft' || e.key === 'a') && player.dx < 0) player.dx = 0;
            else if ((e.key === 'ArrowRight' || e.key === 'd') && player.dx > 0) player.dx = 0;
        });

        function getTouchX(e) { const rect = canvas.getBoundingClientRect(); const touch = e.touches[0] || e.changedTouches[0]; return (touch.clientX - rect.left) * (560 / rect.width); }

        canvas.addEventListener('touchstart', e => {
            if (demoMode && gameRunning) { gameRunning = false; AudioEngine.stopMusic(); demoMode = false; document.getElementById('startOverlay').classList.remove('hidden'); return; }
            if (!gameRunning || gamePaused) return;
            if (isGameOverVisible()) return;
            e.preventDefault();
            if (controlMode === 'touch') { isTouching = true; player.targetX = getTouchX(e); startAutoFire(); } else { shoot(); }
        });

        canvas.addEventListener('touchmove', e => {
            if (!gameRunning || gamePaused || controlMode !== 'touch') return;
            if (isGameOverVisible()) return;
            e.preventDefault();
            if (isTouching) player.targetX = getTouchX(e);
        });

        canvas.addEventListener('touchend', e => {
            if (isGameOverVisible()) return;
            e.preventDefault();
            if (controlMode === 'touch') { isTouching = false; stopAutoFire(); }
        });

        canvas.addEventListener('touchcancel', e => {
            if (isGameOverVisible()) return;
            e.preventDefault();
            if (controlMode === 'touch') { isTouching = false; stopAutoFire(); }
        });

        function handleGyro(e) {
            if (!gyroEnabled || !gameRunning || gamePaused || controlMode !== 'gyro') return;
            const tilt = e.gamma;
            if (Math.abs(tilt) < 5) player.dx = 0;
            else { player.dx = tilt * 0.4; player.dx = Math.max(-player.speed, Math.min(player.speed, player.dx)); }
        }

        function enableGyro() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(r => { if (r === 'granted') { window.addEventListener('deviceorientation', handleGyro); gyroEnabled = true; } }).catch(console.error);
            } else if ('DeviceOrientationEvent' in window) { window.addEventListener('deviceorientation', handleGyro); gyroEnabled = true; }
            else { alert('Gyroscope not available'); setControlMode('touch'); }
        }

        function setControlMode(mode) {
            controlMode = mode; player.targetX = null; player.dx = 0;
            document.getElementById('touchModeBtn').classList.toggle('active', mode === 'touch');
            document.getElementById('gyroModeBtn').classList.toggle('active', mode === 'gyro');
            document.getElementById('controlHint').textContent = mode === 'touch' ? 'TOUCH & DRAG TO MOVE • AUTO-FIRE' : 'TILT TO MOVE • TAP TO FIRE';
            if (mode === 'gyro' && !gyroEnabled) enableGyro();
        }

        document.getElementById('touchModeBtn').addEventListener('click', () => setControlMode('touch'));
        document.getElementById('gyroModeBtn').addEventListener('click', () => setControlMode('gyro'));
        document.getElementById('easyBtn').addEventListener('click', () => startGame('easy'));
        document.getElementById('normalBtn').addEventListener('click', () => startGame('normal'));
        document.getElementById('hardBtn').addEventListener('click', () => startGame('hard'));
        document.getElementById('demoBtn').addEventListener('click', () => startGame('easy', true));
        document.getElementById('restartBtn').addEventListener('click', () => {
            if (demoMode) { demoMode = false; document.getElementById('startOverlay').classList.remove('hidden'); document.getElementById('gameOverOverlay').classList.add('hidden'); }
            else { startGame(difficulty); }
        });

        function drawGlowingEyes(canvasId) {
            const eyeCanvas = document.getElementById(canvasId);
            if (!eyeCanvas) return;
            const ectx = eyeCanvas.getContext('2d');
            let eyeFrame = 0;
            function animateEyes() {
                ectx.clearRect(0, 0, 200, 80);
                eyeFrame += 0.03;
                const pulse = 0.7 + Math.sin(eyeFrame) * 0.3;
                const glowSize = 25 + Math.sin(eyeFrame) * 5;
                const gradL = ectx.createRadialGradient(60, 40, 5, 60, 40, glowSize);
                gradL.addColorStop(0, `rgba(255, 255, 255, ${pulse})`);
                gradL.addColorStop(0.3, `rgba(255, 0, 0, ${pulse * 0.9})`);
                gradL.addColorStop(1, 'rgba(255, 0, 0, 0)');
                ectx.fillStyle = gradL; ectx.fillRect(20, 10, 80, 60);
                ectx.fillStyle = `rgba(255, 50, 50, ${pulse})`;
                ectx.beginPath(); ectx.ellipse(60, 40, 18, 10, -0.2, 0, Math.PI * 2); ectx.fill();
                ectx.fillStyle = `rgba(255, 255, 255, ${pulse})`;
                ectx.beginPath(); ectx.ellipse(65, 38, 6, 4, -0.2, 0, Math.PI * 2); ectx.fill();
                const gradR = ectx.createRadialGradient(140, 40, 5, 140, 40, glowSize);
                gradR.addColorStop(0, `rgba(255, 255, 255, ${pulse})`);
                gradR.addColorStop(0.3, `rgba(255, 0, 0, ${pulse * 0.9})`);
                gradR.addColorStop(1, 'rgba(255, 0, 0, 0)');
                ectx.fillStyle = gradR; ectx.fillRect(100, 10, 80, 60);
                ectx.fillStyle = `rgba(255, 50, 50, ${pulse})`;
                ectx.beginPath(); ectx.ellipse(140, 40, 18, 10, 0.2, 0, Math.PI * 2); ectx.fill();
                ectx.fillStyle = `rgba(255, 255, 255, ${pulse})`;
                ectx.beginPath(); ectx.ellipse(145, 38, 6, 4, 0.2, 0, Math.PI * 2); ectx.fill();
                requestAnimationFrame(animateEyes);
            }
            animateEyes();
        }

        setupLetterPicker();
        drawGlowingEyes('eyesCanvas');
        checkExistingSession();
        document.addEventListener('contextmenu', e => e.preventDefault());

        console.log('%c⚠️ GREEN ZONE DEFENCE', 'font-size: 24px; font-weight: bold; color: #ff6b6b;');
        console.log('%c© 2026 Spencer Green. All Rights Reserved.', 'font-size: 14px; color: #00ff88;');
    </script>
